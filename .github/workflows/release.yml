name: Android CI/CD Release

on:
  push:
    tags:
      - 'v*' # যখনই আপনি v1.0.0 বা v2.1.0 লিখে ট্যাগ পুশ করবেন, এই ওয়ার্কফ্লোটি চালু হবে

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # প্রোডাকশন রিলিজের জন্য APK বিল্ড করুন
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # বিল্ড হওয়া APK-টি GitHub Release-এ অটোমেটিক আপলোড করার জন্য
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }} # আপনার সিক্রেট নেম 'TOKEN' এখানে সেট করে দেওয়া হলো
