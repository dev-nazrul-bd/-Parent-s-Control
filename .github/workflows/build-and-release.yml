name: Build and Release Android App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Set up Environment
        run: |
          if [ ! -f ".env" ]; then
            if [ -f ".env.example" ]; then
              cp .env.example .env
            else
              touch .env
            fi
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK from Build Job
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: .

      - name: Rename APK for Release
        run: mv app-debug.apk parents-control-${{ github.ref_name }}.apk

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: parents-control-${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          body: |
            Automated production build from GitHub Actions workflow.
            
            **App Version:** ${{ github.ref_name }}
            **Latest Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
